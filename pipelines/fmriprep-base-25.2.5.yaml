container:
  repo: repronim-containers
  name: bids-fmriprep

bids_app_args:
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: ".git/tmp/wkdir"
  --skip-bids-validation: ""
  --fs-license-file: "/freesurfer/license.txt"
  --nprocs: "8"
  --mem-mb: "32000"

# Bind the license at an arbitrary path and tell fmriprep where it
# is via --fs-license-file. Do NOT override FREESURFER_HOME — the
# container ships its own FreeSurfer install (including
# subjects/fsaverage) at the container-native FREESURFER_HOME, and
# pointing FREESURFER_HOME at our license-only bind makes fmriprep
# fail with "Expected to find '/freesurfer/subjects/fsaverage'".
singularity_args:
  - --containall
  - --writable-tmpfs
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/templateflow:/templateflow
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt:/freesurfer/license.txt
  - --env TEMPLATEFLOW_HOME=/templateflow

# TODO: partition/nodes/ntasks should come from cluster config, not here.
# Resource allocation is more complex: cluster sets limits, pipeline sets
# minimums, and dataset chunk size informs the actual request. See #3.
cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "24:00:00"
  customized_text: |
    #SBATCH --cpus-per-task=8
    #SBATCH --mem=32G
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

all_results_in_one_zip: true
zip_foldernames:
  fmriprep: "25-2-5"
