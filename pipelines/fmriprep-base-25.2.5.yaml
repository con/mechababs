container:
  repo: repronim-containers
  name: bids-fmriprep

bids_app_args:
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: ".git/tmp/wkdir"
  --skip-bids-validation: ""
  --stop-on-first-crash: ""
  # Pass the HOST path. BABS auto-binds it to
  # /SGLR/FREESURFER_HOME/license.txt and rewrites this flag in the
  # generated singularity invocation. Do NOT also bind it manually.
  --fs-license-file: "/dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt"
  --nprocs: "8"
  --mem-mb: "32000"

# NOTE: with babs's add-containers-run-v2 path, BABS no longer
# auto-binds the FreeSurfer license (that logic was in the old
# bidsapp_run.sh.jinja2 template, not the containers-run path).
# So we bind manually to /SGLR/FREESURFER_HOME/license.txt, which
# is the path BABS still rewrites --fs-license-file to.
singularity_args:
  - --containall
  - --writable-tmpfs
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/templateflow:/templateflow
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt:/SGLR/FREESURFER_HOME/license.txt
  - --env TEMPLATEFLOW_HOME=/templateflow

# TODO: partition/nodes/ntasks should come from cluster config, not here.
# Resource allocation is more complex: cluster sets limits, pipeline sets
# minimums, and dataset chunk size informs the actual request. See #3.
cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "24:00:00"
  temporary_disk_space: 200G
  customized_text: |
    #SBATCH --cpus-per-task=8
    #SBATCH --mem=32G
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

all_results_in_one_zip: true
zip_foldernames:
  fmriprep: "25-2-5"
