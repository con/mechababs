container:
  repo: repronim-containers
  name: bids-fmriprep

# fmriprep --level minimal, chained on anat-only output.
# Produces only what's needed for downstream tools: BOLD reference,
# HMC, SDC prep (if data has fieldmaps), coregistration to T1w,
# confounds. Does NOT resample BOLD to standard spaces and does NOT
# produce CIFTI. The output is the cheapest viable starting point
# for someone who wants to do their own resampling.
#
# Pair-runs with fmriprep-full-25.2.5.yaml off the same anat
# scaffold so we can compare the two outputs directly.
bids_app_args:
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: ".git/tmp/wkdir"
  --level: "minimal"
  --output-spaces: "MNI152NLin2009cAsym:res-2 MNI152NLin6Asym:res-2"
  --cifti-output: "91k"
  --random-seed: "12345"
  --skull-strip-fixed-seed: ""
  --skull-strip-t1w: "force"
  --use-syn-sdc: "warn"
  --notrack: ""
  --md-only-boilerplate: ""
  --skip-bids-validation: ""
  --stop-on-first-crash: ""
  # HOST path; BABS rewrites to /SGLR/FREESURFER_HOME/license.txt.
  --fs-license-file: "/dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt"
  # Path inside the unzipped fmriprep_anat input. The double nesting
  # is real: path_in_babs is sourcedata/fmriprep_anat, and the zip's
  # top folder is also fmriprep_anat/.
  --fs-subjects-dir: '"${PWD}"/sourcedata/fmriprep_anat/fmriprep_anat/sourcedata/freesurfer'
  --nprocs: "4"
  --omp-nthreads: "2"
  --mem-mb: "32000"

singularity_args:
  - --containall
  - -B $JOB_TMP:/tmp
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/templateflow:/templateflow
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt:/SGLR/FREESURFER_HOME/license.txt
  - --env TEMPLATEFLOW_HOME=/templateflow

# Chained input: Project 1's anat-only output. FIX ME PER RUN:
# the origin_url is an absolute path that must point at the
# Project 1 babs-project's output_ria. There is no placeholder
# substitution here yet.
input_datasets:
  fmriprep_anat:
    required_files:
      - "*fmriprep_anat*.zip"
    is_zipped: true
    origin_url: "ria+file:///dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/processing/openneuro-pipe-2026-05-17/ds005896-fmriprep-anat/babs-project/output_ria#~data"
    path_in_babs: sourcedata/fmriprep_anat

cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "24:00:00"
  # Discovery doesn't track per-node TmpDisk in slurm (all nodes
  # report TmpDisk=0), so --tmp=anything is rejected as unsatisfiable.
  # We bind ${JOB_TMP} to /tmp inside the container instead.
  # temporary_disk_space: 200G
  customized_text: |
    #SBATCH --cpus-per-task=8
    #SBATCH --mem=32G
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

all_results_in_one_zip: true
zip_foldernames:
  fmriprep_minimal: "25-2-5"
