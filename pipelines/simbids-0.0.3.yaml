# Fast/cheap TEST pipeline (issue #31). The simbids BIDS app stands in for a
# real app (fmriprep/mriqc) so `iterate` -> `babs init` (and later submit) can be
# exercised inside the pennlinc/slurm-docker-ci container with NO real cluster.
# NOT for real data — paired with clusters/test-docker.yaml.

# short_name: the per-pipeline column prefix in DATASETS_STATE.tsv (unique per campaign).
short_name: simbids

container:
  # Same repronim-containers-shim the real mriqc/fmriprep pipelines use, so the
  # e2e exercises prod's real container-fetch path (and the shim itself). simbids
  # isn't in upstream ReproNim, so tmp-repronim-container-shim.sh builds it from
  # Docker Hub and registers it as `bids-simbids`. `configure` vendors the shim
  # into code/; a relative source resolves against the campaign root.
  source: ../repronim-containers-shim
  name: bids-simbids

bids_app_args:
  --bids-app: "fmriprep"
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  --stop-on-first-crash: ""
  -vv: ""
  --anat-only: ""

singularity_args:
  - --containall
  # Match the real pipelines' container setup so the docker-CI smoke test
  # exercises prod's exact paths: --pwd pins CWD to the bound ds clone (else
  # --containall drops it to a tmpfs $HOME and a relative -w overflows), and the
  # $JOB_TMP:/tmp bind (cluster axis supplies $JOB_TMP) routes /tmp to disk.
  - --pwd "${PWD}"
  - -B $JOB_TMP:/tmp

all_results_in_one_zip: true
zip_foldernames:
  fmriprep_anat: "24-1-1"
