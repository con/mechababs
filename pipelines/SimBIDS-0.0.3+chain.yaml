# Downstream half of the chained-inputs e2e (issue #72): a second simbids stage
# that consumes SimBIDS-0.0.3+anchor's output. Copy of SimBIDS-0.0.3+anchor.yaml plus the
# chained input_datasets edge; paired with clusters/test-docker.yaml. NOT real data.

mechababs:
  selection: {}
  container:
    source: ../repronim-containers-shim
    name: bids-simbids

analysis_path: "."
input_ria_path: ".babs/input_ria"
output_ria_path: ".babs/output_ria"

bids_app_args:
  --bids-app: "fmriprep"
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  --stop-on-first-crash: ""
  -vv: ""
  --anat-only: ""

singularity_args:
  - --containall
  - --pwd "${PWD}"
  - -B $JOB_TMP:/tmp
  - --userns

cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "00:30:00"
  customized_text: |
    #SBATCH --cpus-per-task=1
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

# Chained input: SimBIDS-0.0.3+anchor's output. Key == the producing pipeline's
# short_name, so iterate name-matches it, gates on that stage being merged, and
# injects its output-RIA URL as origin_url (omitted here — it doesn't exist until
# the upstream runs). babs fetches + unzips it as job input-prep even though
# simbids ignores the content.
input_datasets:
  SimBIDS-0.0.3+anchor:
    is_zipped: true
    path_in_babs: sourcedata/SimBIDS-0.0.3+anchor
    required_files:
      - "*SimBIDS-0.0.3+anchor*.zip"

all_results_in_one_zip: true
zip_foldernames:
  SimBIDS-0.0.3+chain: "0-0-3"
