mechababs:
  # mechababs-only config: consumed by mechababs, stripped by merge_config so none
  # of it reaches the babs config. selection = deploy-time subject-eligibility rule;
  # container = which image to vendor + pass to `babs init --container-ds/--container-name`.
  selection:
    require_datatypes: [anat]
    require_positive: [t1w_num]
  container:
    # TODO: swap source to the ReproNim github link (+ ref) once PennLINC/babs#383
    # lands — then the shim is unnecessary.
    source: ../repronim-containers-shim
    name: bids-fmriprep

# BIDS-study layout (babs#369): the babs project root IS the analysis dataset,
# and the RIA stores go under .babs/ — babs's default top-level input_ria/output_ria
# would break datalad's nesting of the (untracked) babs project inside the study.
# Campaign-wide layout choice, living per-pipeline for now (see config-composition-axes);
# MUST match across every pipeline in a campaign. merge_config passes these straight
# into the babs config.
analysis_path: "."
input_ria_path: ".babs/input_ria"
output_ria_path: ".babs/output_ria"

# fmriprep --anat-only run.
# Produces the anatomical scaffold + FreeSurfer recon-all under
# sourcedata/freesurfer/ inside the zipped output. Feeds the
# --level full step that follows.
#
# Flag set matches OpenNeuroDerivatives/fmriprepDerivatives#1
# (the opinions doc), with --skull-strip-t1w force matching Joe's
# practice until we have a per-dataset gating mechanism.
bids_app_args:
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: ".git/tmp/wkdir"
  --anat-only: ""
  --output-spaces: "MNI152NLin2009cAsym:res-2 MNI152NLin6Asym:res-2"
  --cifti-output: "91k"
  --random-seed: "12345"
  --skull-strip-fixed-seed: ""
  --skull-strip-t1w: "force"
  --notrack: ""
  --md-only-boilerplate: ""
  --skip-bids-validation: ""
  --stop-on-first-crash: ""
  # Pass the HOST path. BABS rewrites this flag's value to
  # /SGLR/FREESURFER_HOME/license.txt in the generated singularity
  # invocation; on the add-containers-run-v2 branch BABS does NOT
  # auto-bind, so we bind manually in singularity_args below.
  # TODO babs should not mess with these args.
  --fs-license-file: "/dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt"
  --nprocs: "2"
  --omp-nthreads: "2"
  --mem-mb: "16000"

# License bind: BABS rewrites --fs-license-file to
# /SGLR/FREESURFER_HOME/license.txt but the add-containers-run-v2
# path doesn't auto-bind it anymore, so do it manually.
singularity_args:
  - --containall
  # --pwd pins CWD to the bound ds clone; without it --containall drops CWD to a
  # tmpfs $HOME and the relative -w (.git/tmp/wkdir) overflows it -> ENOSPC. babs
  # main doesn't emit --pwd (the old containers-run branch did). See #55.
  - --pwd "${PWD}"
  - -B $JOB_TMP:/tmp
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/templateflow:/templateflow
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt:/SGLR/FREESURFER_HOME/license.txt
  - --env TEMPLATEFLOW_HOME=/templateflow

# Resource sizing: anat-only is dominated by FreeSurfer recon-all,
# which is largely single-threaded. 4 cores allocated with 2 nprocs ×
# 2 omp-nthreads matches the request (no oversubscription). 36h
# walltime is generous; we'll tighten based on duct logs later.
cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "36:00:00"
  # Discovery doesn't track per-node TmpDisk in slurm (all nodes
  # report TmpDisk=0), so --tmp=anything is rejected as unsatisfiable.
  # We bind ${JOB_TMP} to /tmp inside the container instead.
  # temporary_disk_space: 200G
  customized_text: |
    #SBATCH --cpus-per-task=4
    #SBATCH --mem=24G
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

all_results_in_one_zip: true
zip_foldernames:
  # Key == this pipeline's short_name (filename stem). It names the output
  # folder babs zips AND is the handle a downstream stage matches to chain onto
  # this output (its input_datasets key == this key). One name, so the chain
  # self-assembles by name (see fMRIPrep-25.2.5+minimal.yaml).
  fMRIPrep-25.2.5+anat: "25-2-5"
