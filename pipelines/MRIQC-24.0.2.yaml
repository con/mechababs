mechababs:
  # mechababs-only config: consumed by mechababs, stripped by merge_config so none
  # of it reaches the babs config. selection = deploy-time subject-eligibility rule;
  # container = which image to vendor + pass to `babs init --container-ds/--container-name`.
  selection:
    require_datatypes: [anat]
    require_positive: [t1w_num]
  container:
    # TODO: swap source to the ReproNim github link (+ ref) once PennLINC/babs#383
    # lands — then the shim is unnecessary.
    source: ../repronim-containers-shim
    name: bids-mriqc
    # alternative: build from docker URI (not implemented yet)
    # build: docker://nipreps/mriqc:24.0.2

# BIDS-study layout (babs#369): the babs project root IS the analysis dataset,
# and the RIA stores go under .babs/ — babs's default top-level input_ria/output_ria
# would break datalad's nesting of the (untracked) babs project inside the study.
# Campaign-wide layout choice, living per-pipeline for now (see config-composition-axes);
# MUST match across every pipeline in a campaign. merge_config passes these straight
# into the babs config.
analysis_path: "."
input_ria_path: ".babs/input_ria"
output_ria_path: ".babs/output_ria"

bids_app_args:
  --no-datalad-get: ""
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: ".git/tmp/wkdir"
  --n_cpus: "4"
  --mem_gb: "16"
  -vv: ""
  --no-sub: ""

singularity_args:
  - --containall
  # --pwd is load-bearing: under --containall, apptainer drops the working dir to
  # a tmpfs $HOME instead of the bound ds clone. nipype's -w (.git/tmp/wkdir) is
  # RELATIVE, so without --pwd the work dir resolves onto that tiny tmpfs and
  # overflows -> ENOSPC while /scratch sits idle. Pin CWD to the on-scratch clone.
  # (babs main's run template does not emit --pwd; the old containers-run branch
  # baked it into .datalad/config, which is why fmriprep worked there. #55.)
  - --pwd "${PWD}"
  # Route container /tmp to real scratch disk too ($JOB_TMP is created +
  # trap-cleaned by the cluster preamble).
  - -B $JOB_TMP:/tmp
  # mriqc pulls MNI152NLin2009cAsym for its anatomical IQM workflow; bind the
  # pre-populated cache so it needs no writable download target.
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/templateflow:/templateflow
  - --env TEMPLATEFLOW_HOME=/templateflow

# TODO: partition/nodes/ntasks should come from cluster config, not here.
# Resource allocation is more complex: cluster sets limits, pipeline sets
# minimums, and dataset chunk size informs the actual request. See #3.
cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "24:00:00"
  customized_text: |
    #SBATCH --cpus-per-task=4
    #SBATCH --mem=16G
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

all_results_in_one_zip: true
zip_foldernames:
  mriqc: "24-0-2"
