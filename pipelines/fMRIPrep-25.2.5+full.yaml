selection:
  require_datatypes: [anat, func]
  require_positive: [t1w_num, bold_num]

# BIDS-study layout (babs#369): the babs project root IS the analysis dataset,
# and the RIA stores go under .babs/ — babs's default top-level input_ria/output_ria
# would break datalad's nesting of the (untracked) babs project inside the study.
# Campaign-wide layout choice, living per-pipeline for now (see config-composition-axes);
# MUST match across every pipeline in a campaign. merge_config passes these straight
# into the babs config.
analysis_path: "."
input_ria_path: ".babs/input_ria"
output_ria_path: ".babs/output_ria"

container:
  # TODO: swap source to the ReproNim github link (+ ref) once PennLINC/babs#383
  # lands — then the shim is unnecessary.
  source: ../repronim-containers-shim
  name: bids-fmriprep

bids_app_args:
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: ".git/tmp/wkdir"
  --level: "full"
  --output-spaces: "MNI152NLin2009cAsym:res-2 MNI152NLin6Asym:res-2"
  --cifti-output: "91k"
  --random-seed: "12345"
  --skull-strip-fixed-seed: ""
  --skull-strip-t1w: "force"
  --use-syn-sdc: "warn"
  --me-output-echos: ""
  --notrack: ""
  --md-only-boilerplate: ""
  --skip-bids-validation: ""
  --stop-on-first-crash: ""
  # HOST path; BABS rewrites to /SGLR/FREESURFER_HOME/license.txt.
  --fs-license-file: "/dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt"
  # Path inside the unzipped fMRIPrep-25.2.5+anat input. The double nesting
  # is real: path_in_babs is sourcedata/fMRIPrep-25.2.5+anat, and the zip's
  # top folder is also fMRIPrep-25.2.5+anat/.
  --fs-subjects-dir: '"${PWD}"/sourcedata/fMRIPrep-25.2.5+anat/fMRIPrep-25.2.5+anat/sourcedata/freesurfer'
  --nprocs: "4"
  --omp-nthreads: "2"
  --mem-mb: "32000"

singularity_args:
  - --containall
  - -B $JOB_TMP:/tmp
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/templateflow:/templateflow
  - -B /dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/license.txt:/SGLR/FREESURFER_HOME/license.txt
  - --env TEMPLATEFLOW_HOME=/templateflow

# Chained input: Project 1's anat-only output. FIX ME PER RUN:
# the origin_url is an absolute path that must point at the
# Project 1 babs-project's output_ria. There is no placeholder
# substitution here yet.
input_datasets:
  fMRIPrep-25.2.5+anat:
    required_files:
      - "*fMRIPrep-25.2.5+anat*.zip"
    is_zipped: true
    origin_url: "ria+file:///dartfs/rc/lab/D/DBIC/DBIC/CON/asmacdo/mechababs/processing/openneuro-pipe-2026-05-17/ds005896-fmriprep-anat/babs-project/output_ria#~data"
    path_in_babs: sourcedata/fMRIPrep-25.2.5+anat

cluster_resources:
  interpreting_shell: "/bin/bash"
  hard_runtime_limit: "24:00:00"
  # Discovery doesn't track per-node TmpDisk in slurm (all nodes
  # report TmpDisk=0), so --tmp=anything is rejected as unsatisfiable.
  # We bind ${JOB_TMP} to /tmp inside the container instead.
  # temporary_disk_space: 200G
  customized_text: |
    #SBATCH --cpus-per-task=8
    #SBATCH --mem=32G
    #SBATCH --nodes=1
    #SBATCH --ntasks=1

all_results_in_one_zip: true
zip_foldernames:
  fmriprep: "25-2-5"
