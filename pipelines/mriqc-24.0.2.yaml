container:
  # pre-built SIF in a datalad dataset
  repo: repronim-containers
  name: bids-mriqc
  # alternative: build from docker URI (not implemented yet)
  # build: docker://nipreps/mriqc:24.0.2

bids_app_args:
  --no-datalad-get: ""
  $SUBJECT_SELECTION_FLAG: "--participant-label"
  -w: "$BABS_TMPDIR"
  --n_cpus: "4"
  --mem_gb: "16"
  -vv: ""
  --no-sub: ""

singularity_args:
  - --containall
  - --writable-tmpfs

all_results_in_one_zip: true
zip_foldernames:
  mriqc: "24-0-2"
